version: '3.8'

services:
  # 1. SERVICE BACKEND (Menggunakan Image GHCR)
  backend-api:
    # --- SEBELUMNYA ---
    # build:
    #   context: .
    #   dockerfile: ./api/app/Dockerfile
    # --- SEKARANG (TUGAS PRODUCT LEAD) ---
    image: ghcr.io/username-atau-org-kelompok/repo-be:v1.0.0
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db-server
      - DB_PORT=3306                     # Port standar MySQL
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}       # Mengambil dari file .env lokal
    networks:
      - tim-network
    depends_on:
      - db-server

  # 2. SERVICE FRONTEND (Menggunakan Image GHCR)
  frontend-web:
    # --- SEBELUMNYA ---
    # build:
    #   context: ./project
    #   dockerfile: ./Dockerfile
    # --- SEKARANG (TUGAS PRODUCT LEAD) ---
    image: ghcr.io/username-atau-org-kelompok/repo-fe:v1.0.0
    ports:
      - "8080:80"
    volumes:
      # === [ BIND MOUNT ] ===
      # Tetap dipertahankan untuk kebutuhan production assets / config eksternal jika ada
      - ./project/public/assets:/var/www/html/public/assets
    networks:
      - tim-network

  # 3. SERVICE LOGS (Product Lead - Monitoring Error Logs)
  logs-monitor:
    image: busybox
    volumes:
      # === [ BIND MOUNT ] ===
      - ./project/writable/logs:/logs
    command: tail -F /logs/application.log
    networks:
      - tim-network
    depends_on:
      - frontend-web

  # 4. SERVICE DATABASE (MySQL 8)
  db-server:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      # === [ NAMED VOLUME ] ===
      - database-tim-volume:/var/lib/mysql
    networks:
      - tim-network

# DEFINISI NAMED VOLUME GLOBAL (Syarat Wajib Laporan Kelompok)
volumes:
  database-tim-volume:

networks:
  tim-network:
    driver: bridge